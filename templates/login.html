{% extends "base.html" %}
{% block title %}Iniciar Sesión — SmartShop{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card p-4 mt-2">
        <div class="text-center mb-4">
          <i class="bi bi-shop fs-1 text-primary"></i>
          <h4 class="fw-bold mt-2 mb-0">SmartShop</h4>
          <p class="text-muted small">Accede al panel de administración</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="usuario" class="form-control"
                     required placeholder="admin" autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="contrasena" class="form-control"
                     required placeholder="••••••••">
            </div>
          </div>
          <button class="btn btn-primary w-100 fw-bold">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
          </button>
        </form>

        <p class="text-center text-muted small mt-3 mb-0">
          Demo: <code>admin</code> / <code>admin123</code>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
