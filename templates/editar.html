{% extends "base.html" %}
{% block title %}Editar Producto — SmartShop{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h5 class="fw-bold mb-4">
          <i class="bi bi-pencil-square text-warning"></i> Editar Producto #{{ producto.id }}
        </h5>
        <form method="POST" action="{{ url_for('editar', producto_id=producto.id) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   required value="{{ producto.nombre }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Cantidad</label>
            <input type="number" name="cantidad" class="form-control"
                   required min="0" value="{{ producto.cantidad }}">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Precio unitario ($)</label>
            <input type="number" name="precio" class="form-control"
                   required min="0" step="0.01" value="{{ producto.precio }}">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-warning fw-bold flex-grow-1">
              <i class="bi bi-floppy"></i> Actualizar
            </button>
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary flex-grow-1">
              <i class="bi bi-x-circle"></i> Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
