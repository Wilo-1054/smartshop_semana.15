{% extends "base.html" %}
{% block title %}Editar Usuario MySQL — SmartShop{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h5 class="fw-bold mb-4">
          <i class="bi bi-person-gear text-secondary"></i> Editar Usuario MySQL #{{ u.id_usuario }}
        </h5>
        <form method="POST" action="{{ url_for('mysql_editar_usuario', uid=u.id_usuario) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre completo</label>
            <input type="text" name="nombre" class="form-control" required value="{{ u.nombre }}">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" name="mail" class="form-control" required value="{{ u.mail }}">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-warning fw-bold flex-grow-1">
              <i class="bi bi-floppy"></i> Actualizar
            </button>
            <a href="{{ url_for('mysql_usuarios') }}" class="btn btn-outline-secondary flex-grow-1">
              <i class="bi bi-x-circle"></i> Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
